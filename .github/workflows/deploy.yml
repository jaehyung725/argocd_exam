name: CI-CD Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: jaehyung725/echo-hostname

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t $IMAGE_NAME:${{ github.sha }} echo-hostname/.

    - name: Push Docker image
      run: |
        docker push $IMAGE_NAME:${{ github.sha }}


# 자동화를 위해 추가한 내용
    - name: Update Kubernetes manifest
      run: |
        git clone https://github.com/jaehyung725/argocd_exam.git
        cd app_exam-k8s/k8s/

        echo "수정전 deployment.yaml"
        cat deployment.yaml
        echo "==================="

        sed -i "s|image:.*|image: $IMAGE_NAME:${{ github.sha }}|g" deployment.yaml

        echo "수정후 deployment.yaml"
        cat deployment.yaml
        echo "==================="

        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add .
        git commit -m "update image tag ${{ github.sha }}"
        git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/jaehyung725/argocd_exam.git```