apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostname-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      name: my-webserver
      labels:
        app: webserver
    spec:
      imagePullSecrets:          #docker hub 관련 정보 추가
      - name: dockerhub-secret #docker hub 관련 정보 추가
      containers:
      - name: my-webserver
      # 이미지는 본인 이미지로 변경 필요
        image: jaehyung725/echo-hostname:332bae9d573346830950e8a2167ef06918fd02af
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
